- appId: recs-api
  env: prd
  deploy: { version: "1.4.2", commitId: "c3d4e5f", branch: main, deployedBy: carol@example.com, state: failed,  deployedAt: "2026-03-26T08:30:00.000Z", notes: "memory regression detected by canary" }
- appId: recs-api
  env: prd
  deploy: { version: "1.4.1", commitId: "b2c3d4e", branch: main, deployedBy: carol@example.com, state: rolledback, deployedAt: "2026-03-26T08:45:00.000Z", notes: "auto-rollback to 1.4.1" }
