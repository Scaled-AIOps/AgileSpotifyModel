# AppStatus seed data consumed by scripts/mock_appstatus.js
# Each entry is one deploy event. The loader replays them in order via
#   POST /appstatus/<appId>/<env>
# so the resulting log on disk preserves chronological order.
#
# IMPORTANT: every `appId` must already exist in /appinfo. Seed in this order:
#   node scripts/mock_data.js seed
#   node scripts/mock_infra.js seed
#   node scripts/mock_appinfo.js seed
#   node scripts/mock_appstatus.js seed

# ─── recs-api: full prd lineage with a regression + rollback ────────────────
- appId: recs-api
  env: prd
  deploy: { version: "1.4.0", commitId: "a1b2c3d", branch: main, deployedBy: alice@example.com, state: success, deployedAt: "2026-03-12T08:30:00.000Z", xray: "https://xray.example.com/recs-api/1.4.0", javaVersion: "17", javaComplianceStatus: compliant }
- appId: recs-api
  env: prd
