  releaseManager: rm.apps@example.com
  agileCoach: ac.apps@example.com
  description: Mobile + web client apps.
- name: DAT
  tribeName: Data
  subDomain: Data
  tribeDomain: Engineering
  lead: amy.lin@example.com
