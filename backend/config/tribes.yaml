# Each tribe carries a `lead` (who runs it), a `releaseManager`
# (who owns deploy cadence + change-request workflow for every app under it),
# and an `agileCoach` (who facilitates ceremonies, retros, dependency mapping,
# and team-of-teams working agreements across all squads in the tribe).
#
# `name`      = short code (e.g. INF, PSS) — stable identifier shown in URLs/badges
# `tribeName` = long form (e.g. "Infrastructure", "Payment System Services") — display
- name: INF
  tribeName: Infrastructure
  subDomain: SRE
  tribeDomain: Engineering
  lead: nils.peak@example.com
  releaseManager: rm.infra@example.com
  agileCoach: ac.infra@example.com
  description: Platform, observability, devex.
  confluence: https://confluence.example.com/display/INFRA
- name: COM
  tribeName: Commerce
  subDomain: Storefront
  tribeDomain: Business
  lead: priya.shah@example.com
  releaseManager: rm.commerce@example.com
  agileCoach: ac.commerce@example.com
  description: Checkout, payments, cart.
  confluence: https://confluence.example.com/display/COMM
- name: SEC
  tribeName: Security
  subDomain: AppSec
  tribeDomain: Engineering
  lead: clara.vogt@example.com
  releaseManager: rm.security@example.com
  agileCoach: ac.security@example.com
  description: Identity, auth, app-sec controls.
- name: DSC
  tribeName: Discovery
  subDomain: Relevance
  tribeDomain: Product
  lead: iris.solano@example.com
  releaseManager: rm.discovery@example.com
  agileCoach: ac.discovery@example.com
