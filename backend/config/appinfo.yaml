# AppInfo seed data consumed at server startup by src/lib/seed-yaml.ts.
# 51 apps across all 16 squads. Status mix:
#   ~40 active, 3 inactive, 5 marked-for-decommissioning, 3 failed
#
# Each record's `ocp:` and `gcp:` blocks list the per-environment cluster
# (`{env}Platform`) and ingress URL (`{env}Url`); `buildChart` / `chart` name
# the helm bundles used in the OCP pipeline. The seed loader reads either the
# legacy flat *Platform / *Url fields OR the nested ocp.{env}Platform shape.
#
# IMPORTANT: every `squad` and `*Platform` value must already exist in Redis
# (squad.key / infra.platformId). The startup-seed handles that ordering.

- appId: auth-api
  gitRepo: https://github.com/example/auth-api
  squad: platform
  ocp:
    intPlatform: backend-int-cluster
    uatPlatform: backend-uat-cluster
    prdPlatform: backend-prd-cluster
    intUrl: https://gw-int-auth-api.intranet.example.com
    uatUrl: https://gw-uat-auth-api.intranet.example.com
    prdUrl: https://gw-prd-auth-api.intranet.example.com
    buildChart: ocp-node-build
    chart: ocp-node
  gcp:
    intPlatform: backend-int-cluster
    uatPlatform: backend-uat-cluster
    prdPlatform: backend-prd-cluster
    intUrl: https://gw-int-auth-api.gcp.example.com
    uatUrl: https://gw-uat-auth-api.gcp.example.com
    prdUrl: https://gw-prd-auth-api.gcp.example.com
  probeHealth: /health
  probeInfo: /info
  probeLiveness: /health/liveness
  probeReadiness: /health/readiness
  status: active
  tags: { criticality: high, pillar: platform }

